<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodtune 🎵</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f4f0;
      --text: #1a1a1a;
      --text-secondary: #666660;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.2);
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --purple-bg: #EEEDFE;
      --purple-text: #3C3489;
      --purple-border: #AFA9EC;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --bg-secondary: #242424;
        --text: #f0eeea;
        --text-secondary: #999890;
        --border: rgba(255,255,255,0.12);
        --border-md: rgba(255,255,255,0.2);
        --purple-bg: #26215C;
        --purple-text: #CECBF6;
        --purple-border: #534AB7;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-secondary);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .app {
      width: 100%;
      max-width: 600px;
    }

    .lang-toggle {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-bottom: 1.5rem;
    }

    .lang-btn {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 0.5px solid var(--border-md);
      background: var(--bg);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .lang-btn.active {
      background: var(--purple-bg);
      color: var(--purple-text);
      border-color: var(--purple-border);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .input-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      display: block;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px 14px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-lg);
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg-secondary);
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.6;
    }

    textarea:focus {
      border-color: var(--purple-border);
    }

    .chips-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 1rem 0 8px;
      display: block;
    }

    .mood-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 7px 16px;
      border-radius: 999px;
      border: 0.5px solid var(--border-md);
      font-size: 13px;
      cursor: pointer;
      background: var(--bg);
      color: var(--text-secondary);
      transition: all 0.15s;
      user-select: none;
    }

    .chip:hover {
      background: var(--bg-secondary);
      color: var(--text);
    }

    .chip.active {
      background: var(--purple-bg);
      border-color: var(--purple-border);
      color: var(--purple-text);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--bg);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-lg);
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 1rem;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--bg-secondary);
    }

    .submit-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result-section {
      display: none;
      margin-top: 0.5rem;
    }

    .mood-badge {
      display: inline-block;
      padding: 5px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      background: var(--purple-bg);
      color: var(--purple-text);
      margin-bottom: 12px;
    }

    .message-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.8;
    }

    .card h3 {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
    }

    .playlist-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .platform-badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 4px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .yt { background: #FAECE7; color: #993C1D; }
    .sp { background: #EAF3DE; color: #27500A; }

    @media (prefers-color-scheme: dark) {
      .yt { background: #4A1B0C; color: #F5C4B3; }
      .sp { background: #173404; color: #C0DD97; }
    }

    .playlist-title {
      font-size: 14px;
      color: var(--text);
      flex: 1;
      line-height: 1.4;
    }

    .playlist-link {
      font-size: 13px;
      color: var(--purple-text);
      text-decoration: none;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .playlist-link:hover { text-decoration: underline; }

    .loading-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      padding: 2rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-md);
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-8px); opacity: 1; }
    }

    .error-msg {
      font-size: 14px;
      color: #993C1D;
      text-align: center;
      padding: 1rem;
    }

    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 12px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
<div class="app">

  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">English</button>
  </div>

  <div class="header">
    <h1>🎵 Moodtune</h1>
    <p id="subtitle-text">지금 기분을 알려주세요.<br>어울리는 음악을 찾아드릴게요.</p>
  </div>

  <div class="card">
    <span class="input-label" id="input-label">오늘 어떤 하루였나요?</span>
    <textarea id="mood-input" placeholder="예) 오늘 너무 힘들었어, 그냥 쉬고 싶다..."></textarea>

    <span class="chips-label" id="chips-label">또는 감정 태그를 골라보세요</span>
    <div class="mood-chips" id="mood-chips">
      <div class="chip" onclick="toggleChip(this)" data-ko="설레는" data-en="Excited">설레는</div>
      <div class="chip" onclick="toggleChip(this)" data-ko="우울한" data-en="Down">우울한</div>
      <div class="chip" onclick="toggleChip(this)" data-ko="신나는" data-en="Energetic">신나는</div>
      <div class="chip" onclick="toggleChip(this)" data-ko="차분한" data-en="Calm">차분한</div>
      <div class="chip" onclick="toggleChip(this)" data-ko="그리운" data-en="Nostalgic">그리운</div>
      <div class="chip" onclick="toggleChip(this)" data-ko="지친" data-en="Tired">지친</div>
      <div class="chip" onclick="toggleChip(this)" data-ko="행복한" data-en="Happy">행복한</div>
      <div class="chip" onclick="toggleChip(this)" data-ko="불안한" data-en="Anxious">불안한</div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="analyze()">
      <span id="btn-text">음악 찾아주기 ↗</span>
    </button>
  </div>

  <div class="result-section" id="result-section">
    <div class="card" id="message-card">
      <div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
    <div class="card" id="playlist-card">
      <div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  </div>

  <div class="footer">Moodtune · AI 음악 추천 Agent</div>
</div>

<script>
  const ANTHROPIC_API_KEY = 'YOUR_API_KEY_HERE';

  let currentLang = 'ko';

  const i18n = {
    ko: {
      subtitle: '지금 기분을 알려주세요.<br>어울리는 음악을 찾아드릴게요.',
      inputLabel: '오늘 어떤 하루였나요?',
      placeholder: '예) 오늘 너무 힘들었어, 그냥 쉬고 싶다...',
      chipsLabel: '또는 감정 태그를 골라보세요',
      btnText: '음악 찾아주기 ↗',
      btnLoading: '분석 중...',
      messageLabel: '공감 메시지',
      playlistLabel: '추천 플레이리스트',
      errorEmpty: '기분을 입력하거나 감정 태그를 선택해주세요.',
      errorApi: '잠시 오류가 발생했어요. 다시 시도해주세요.',
      listenBtn: '듣기',
    },
    en: {
      subtitle: 'Tell me how you feel.<br>I\'ll find the perfect music for you.',
      inputLabel: 'How was your day?',
      placeholder: 'e.g. I\'m exhausted and just want to rest...',
      chipsLabel: 'Or pick an emotion tag',
      btnText: 'Find my music ↗',
      btnLoading: 'Analyzing...',
      messageLabel: 'Empathy message',
      playlistLabel: 'Recommended playlists',
      errorEmpty: 'Please enter your mood or select a tag.',
      errorApi: 'Something went wrong. Please try again.',
      listenBtn: 'Listen',
    }
  };

  function setLang(lang) {
    currentLang = lang;
    document.getElementById('btn-ko').className = 'lang-btn' + (lang === 'ko' ? ' active' : '');
    document.getElementById('btn-en').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
    const t = i18n[lang];
    document.getElementById('subtitle-text').innerHTML = t.subtitle;
    document.getElementById('input-label').textContent = t.inputLabel;
    document.getElementById('mood-input').placeholder = t.placeholder;
    document.getElementById('chips-label').textContent = t.chipsLabel;
    document.getElementById('btn-text').textContent = t.btnText;
    document.querySelectorAll('.chip').forEach(c => { c.textContent = c.dataset[lang]; });
    document.getElementById('result-section').style.display = 'none';
  }

  function toggleChip(el) { el.classList.toggle('active'); }

  async function analyze() {
    const input = document.getElementById('mood-input').value.trim();
    const chips = [...document.querySelectorAll('.chip.active')].map(c => c.dataset[currentLang]);
    const combined = [input, ...chips].filter(Boolean).join(', ');
    const t = i18n[currentLang];

    if (!combined) { alert(t.errorEmpty); return; }

    const btn = document.getElementById('submit-btn');
    document.getElementById('btn-text').textContent = t.btnLoading;
    btn.disabled = true;

    const resultSection = document.getElementById('result-section');
    resultSection.style.display = 'block';
    const loadingHtml = `<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    document.getElementById('message-card').innerHTML = loadingHtml;
    document.getElementById('playlist-card').innerHTML = loadingHtml;

    const systemPrompt = currentLang === 'ko'
      ? `당신은 Moodtune이라는 감성적인 음악 추천 AI입니다. 사용자의 감정을 분석하여 어울리는 음악을 추천합니다.
반드시 아래 JSON 형식으로만 응답하세요 (코드블록, 설명 없이 순수 JSON만):
{
  "mood": "감정을 한 단어로",
  "message": "사용자 감정에 공감하는 따뜻한 메시지 2-3문장",
  "playlists": [
    {"platform": "youtube", "title": "플레이리스트 제목", "url": "https://www.youtube.com/results?search_query=키워드"},
    {"platform": "youtube", "title": "플레이리스트 제목2", "url": "https://www.youtube.com/results?search_query=키워드2"},
    {"platform": "spotify", "title": "플레이리스트 제목", "url": "https://open.spotify.com/search/키워드"},
    {"platform": "spotify", "title": "플레이리스트 제목2", "url": "https://open.spotify.com/search/키워드2"}
  ]
}`
      : `You are Moodtune, an empathetic music recommendation AI. Analyze the user's emotions and recommend fitting music.
Respond ONLY with raw JSON, no code blocks, no explanation:
{
  "mood": "one-word emotion",
  "message": "2-3 warm empathetic sentences",
  "playlists": [
    {"platform": "youtube", "title": "playlist title", "url": "https://www.youtube.com/results?search_query=keywords"},
    {"platform": "youtube", "title": "playlist title 2", "url": "https://www.youtube.com/results?search_query=keywords2"},
    {"platform": "spotify", "title": "playlist title", "url": "https://open.spotify.com/search/keywords"},
    {"platform": "spotify", "title": "playlist title 2", "url": "https://open.spotify.com/search/keywords2"}
  ]
}`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: currentLang === 'ko' ? `사용자 감정: ${combined}` : `User mood: ${combined}` }]
        })
      });

      const data = await response.json();
      const raw = data.content[0].text.replace(/```json|```/g, '').trim();
      const result = JSON.parse(raw);

      document.getElementById('message-card').innerHTML = `
        <h3>${t.messageLabel}</h3>
        <div class="mood-badge">${result.mood}</div>
        <p class="message-text">${result.message}</p>
      `;

      document.getElementById('playlist-card').innerHTML = `
        <h3>${t.playlistLabel}</h3>
        ${result.playlists.map(p => `
          <div class="playlist-item">
            <span class="platform-badge ${p.platform === 'youtube' ? 'yt' : 'sp'}">
              ${p.platform === 'youtube' ? 'YouTube' : 'Spotify'}
            </span>
            <span class="playlist-title">${p.title}</span>
            <a class="playlist-link" href="${p.url}" target="_blank" rel="noopener">
              ${t.listenBtn} <i class="ti ti-external-link" style="font-size:14px"></i>
            </a>
          </div>
        `).join('')}
      `;

    } catch (e) {
      document.getElementById('message-card').innerHTML = `<p class="error-msg">${t.errorApi}</p>`;
      document.getElementById('playlist-card').innerHTML = '';
    }

    btn.disabled = false;
    document.getElementById('btn-text').textContent = t.btnText;
  }
</script>
</body>
</html>
